<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-powered penny stock research and paper trading terminal using real market data." />
    <title>AI Penny Stock Terminal</title>
    <style>
      #boot-status {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #06080d;
        color: #dbeafe;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #boot-status div {
        max-width: 680px;
        border: 1px solid #243044;
        border-radius: 16px;
        background: #0d1320;
        padding: 28px;
      }
      #boot-status h1 {
        margin: 0 0 10px;
        color: #67e8f9;
        font-size: 24px;
      }
      #boot-status p {
        margin: 0;
        color: #94a3b8;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main id="boot-status">
        <div>
          <h1>Starting AI Penny Stock Terminal</h1>
          <p>If this message stays on screen, the desktop renderer did not mount. The app will write details to the Electron log.</p>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
